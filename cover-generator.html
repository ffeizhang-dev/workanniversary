<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封面图片 - 入职周年祝福提醒系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }

        .cover-container {
            width: 1200px;
            height: 630px;
            position: relative;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* 渐变背景 */
        .cover-background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #00796B 0%, #004D40 50%, #00251A 100%);
        }

        /* 装饰圆形 */
        .decoration-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }

        .circle-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation: float 20s infinite ease-in-out;
        }

        .circle-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            animation: float 15s infinite ease-in-out reverse;
        }

        .circle-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            top: 50%;
            left: 20%;
            animation: float 18s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-30px, -30px) scale(1.1);
            }
        }

        /* 网格背景 */
        .grid-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.5;
        }

        /* 内容区域 */
        .cover-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            color: white;
        }

        /* Logo */
        .li-logo {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: 700;
            color: white;
            letter-spacing: -3px;
            margin-bottom: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            animation: logoGlow 3s infinite ease-in-out;
        }

        @keyframes logoGlow {
            0%, 100% {
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 0 0 rgba(255, 255, 255, 0);
            }
            50% {
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 30px 10px rgba(255, 255, 255, 0.3);
            }
        }

        /* 标题 */
        .cover-title {
            font-size: 72px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -2px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .cover-title .highlight {
            background: linear-gradient(135deg, #FFFFFF 0%, #E0F2F1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 副标题 */
        .cover-subtitle {
            font-size: 28px;
            font-weight: 400;
            line-height: 1.6;
            opacity: 0.95;
            margin-bottom: 48px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        /* 特性标签 */
        .feature-tags {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .feature-tag {
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            animation: tagFloat 3s infinite ease-in-out;
        }

        .feature-tag:nth-child(1) { animation-delay: 0s; }
        .feature-tag:nth-child(2) { animation-delay: 0.3s; }
        .feature-tag:nth-child(3) { animation-delay: 0.6s; }
        .feature-tag:nth-child(4) { animation-delay: 0.9s; }

        @keyframes tagFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .feature-tag:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-4px);
        }

        .tag-icon {
            font-size: 20px;
        }

        /* 右下角装饰 */
        .corner-decoration {
            position: absolute;
            bottom: 40px;
            right: 80px;
            display: flex;
            align-items: center;
            gap: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
        }

        .version-badge {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 8s infinite ease-in-out;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0);
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-400px) translateX(100px);
            }
        }

        /* 生成多个粒子 */
        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 1s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 3s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 4s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 6s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 7s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 1.5s; }
        .particle:nth-child(10) { left: 15%; animation-delay: 3.5s; }

        /* 控制面板 */
        .control-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .control-panel h3 {
            margin-bottom: 16px;
            color: #1D2129;
            font-size: 16px;
        }

        .control-panel button {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #00796B, #00695C);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .control-panel button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 121, 107, 0.3);
        }

        .control-panel .size-info {
            font-size: 12px;
            color: #86909C;
            margin-top: 8px;
            padding-top: 12px;
            border-top: 1px solid #E5E8EF;
        }
    </style>
</head>
<body>
    <!-- 控制面板 -->
    <div class="control-panel">
        <h3>📸 封面图片工具</h3>
        <button onclick="downloadCover()">下载为PNG图片</button>
        <button onclick="copyToClipboard()">复制到剪贴板</button>
        <button onclick="toggleAnimation()">暂停/恢复动画</button>
        <div class="size-info">
            尺寸: 1200 × 630 像素<br>
            适用: 社交媒体、文档封面
        </div>
    </div>

    <!-- 封面容器 -->
    <div class="cover-container" id="coverContainer">
        <!-- 背景 -->
        <div class="cover-background"></div>

        <!-- 网格图案 -->
        <div class="grid-pattern"></div>

        <!-- 装饰圆形 -->
        <div class="decoration-circle circle-1"></div>
        <div class="decoration-circle circle-2"></div>
        <div class="decoration-circle circle-3"></div>

        <!-- 粒子效果 -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <!-- 内容 -->
        <div class="cover-content">
            <div class="li-logo">Li</div>

            <h1 class="cover-title">
                <span class="highlight">入职周年</span><br>
                祝福提醒系统
            </h1>

            <p class="cover-subtitle">
                让每一个重要时刻都被记住<br>
                智能管理 · 自动提醒 · 温暖祝福
            </p>

            <div class="feature-tags">
                <div class="feature-tag">
                    <span class="tag-icon">🎂</span>
                    <span>自动周年提醒</span>
                </div>
                <div class="feature-tag">
                    <span class="tag-icon">☁️</span>
                    <span>云端多人协作</span>
                </div>
                <div class="feature-tag">
                    <span class="tag-icon">📱</span>
                    <span>飞书消息发送</span>
                </div>
                <div class="feature-tag">
                    <span class="tag-icon">🔐</span>
                    <span>企业级安全</span>
                </div>
            </div>
        </div>

        <!-- 右下角装饰 -->
        <div class="corner-decoration">
            <span class="version-badge">v2.0</span>
            <span>Powered by Li Auto Design</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        let animationPaused = false;

        // 下载封面图片
        async function downloadCover() {
            const button = event.target;
            button.textContent = '生成中...';
            button.disabled = true;

            try {
                const container = document.getElementById('coverContainer');
                const canvas = await html2canvas(container, {
                    backgroundColor: null,
                    scale: 2,
                    logging: false,
                    useCORS: true
                });

                // 转换为blob并下载
                canvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = '入职周年系统封面_' + Date.now() + '.png';
                    a.click();
                    URL.revokeObjectURL(url);

                    button.textContent = '下载为PNG图片';
                    button.disabled = false;
                });
            } catch (error) {
                alert('下载失败: ' + error.message);
                button.textContent = '下载为PNG图片';
                button.disabled = false;
            }
        }

        // 复制到剪贴板
        async function copyToClipboard() {
            const button = event.target;
            button.textContent = '生成中...';
            button.disabled = true;

            try {
                const container = document.getElementById('coverContainer');
                const canvas = await html2canvas(container, {
                    backgroundColor: null,
                    scale: 2,
                    logging: false,
                    useCORS: true
                });

                canvas.toBlob(async function(blob) {
                    try {
                        await navigator.clipboard.write([
                            new ClipboardItem({ 'image/png': blob })
                        ]);
                        button.textContent = '✓ 已复制!';
                        setTimeout(() => {
                            button.textContent = '复制到剪贴板';
                            button.disabled = false;
                        }, 2000);
                    } catch (err) {
                        alert('复制失败，请使用下载功能');
                        button.textContent = '复制到剪贴板';
                        button.disabled = false;
                    }
                });
            } catch (error) {
                alert('生成失败: ' + error.message);
                button.textContent = '复制到剪贴板';
                button.disabled = false;
            }
        }

        // 切换动画
        function toggleAnimation() {
            const container = document.getElementById('coverContainer');
            if (animationPaused) {
                container.style.animationPlayState = 'running';
                container.querySelectorAll('*').forEach(el => {
                    el.style.animationPlayState = 'running';
                });
                animationPaused = false;
                event.target.textContent = '暂停动画';
            } else {
                container.style.animationPlayState = 'paused';
                container.querySelectorAll('*').forEach(el => {
                    el.style.animationPlayState = 'paused';
                });
                animationPaused = true;
                event.target.textContent = '恢复动画';
            }
        }

        // 提示用户
        console.log('💡 提示: 点击左上角按钮可以下载封面图片或复制到剪贴板');
    </script>
</body>
</html>
