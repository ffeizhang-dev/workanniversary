<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入职周年祝福确认 - 理想汽车</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #F7F8FA;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #00796B 0%, #00695C 100%);
            padding: 40px;
            border-radius: 20px 20px 0 0;
            color: white;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 121, 107, 0.2);
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .main-content {
            background: white;
            padding: 40px;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: linear-gradient(135deg, #E0F2F1 0%, #B2DFDB 100%);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #00796B;
            margin-bottom: 8px;
        }

        .stat-label {
            color: #4E5969;
            font-size: 14px;
        }

        .blessing-card {
            background: #FAFAFA;
            border: 2px solid #E5E8EF;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            transition: all 0.3s;
        }

        .blessing-card:hover {
            border-color: #00796B;
            box-shadow: 0 8px 24px rgba(0, 121, 107, 0.15);
        }

        .employee-info {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            border-left: 4px solid #00796B;
        }

        .employee-info h3 {
            color: #1D2129;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            color: #4E5969;
            font-size: 14px;
        }

        .info-item {
            display: flex;
            gap: 8px;
        }

        .info-label {
            font-weight: 600;
            color: #1D2129;
        }

        .message-preview {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px dashed #E5E8EF;
            line-height: 1.8;
            white-space: pre-wrap;
            color: #1D2129;
        }

        .template-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #FFF7E8;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .template-style {
            color: #FF9520;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00796B, #00695C);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 121, 107, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #00796B;
            border: 2px solid #00796B;
        }

        .btn-secondary:hover {
            background: #E0F2F1;
        }

        .btn-danger {
            background: white;
            color: #F54B5E;
            border: 2px solid #F54B5E;
        }

        .btn-danger:hover {
            background: #FFECE8;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #E8F7F0;
            border-left: 4px solid #00B96B;
            color: #00B96B;
        }

        .alert-error {
            background: #FFECE8;
            border-left: 4px solid #F54B5E;
            color: #F54B5E;
        }

        .alert-warning {
            background: #FFF7E8;
            border-left: 4px solid #FF9520;
            color: #FF9520;
        }

        .alert-info {
            background: #E0F2F1;
            border-left: 4px solid #00796B;
            color: #00796B;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #86909C;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            color: #1D2129;
            font-size: 24px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 32px;
            color: #86909C;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #1D2129;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 16px;
            border: 2px solid #E5E8EF;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.8;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #00796B;
        }

        .batch-actions {
            background: #E0F2F1;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #86909C;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #E5E8EF;
            border-top: 3px solid #00796B;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .main-content {
                padding: 20px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* 顶部导航栏 */
        .top-nav {
            background: white;
            border-bottom: 1px solid #E5E8EF;
            padding: 16px 0;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .top-nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .li-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00796B 0%, #00695C 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -1px;
        }

        .logo-title {
            font-size: 16px;
            font-weight: 600;
            color: #1D2129;
        }

        .nav-menu {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 8px;
            color: #4E5969;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
            background: transparent;
        }

        .nav-link:hover {
            background: rgba(0, 121, 107, 0.08);
            color: #00796B;
        }

        .nav-link.active {
            background: linear-gradient(135deg, #00796B 0%, #00695C 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 121, 107, 0.2);
        }

        /* 移动端导航适配 */
        @media (max-width: 768px) {
            .top-nav-content {
                flex-direction: column;
                gap: 12px;
            }

            .nav-menu {
                width: 100%;
                justify-content: center;
            }

            .nav-link {
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="top-nav">
        <div class="top-nav-content">
            <div class="logo-container">
                <div class="li-logo">Li</div>
                <div class="logo-title">入职周年祝福提醒系统</div>
            </div>

            <div class="nav-menu">
                <a href="work-anniversary-reminder.html" class="nav-link">
                    🏠 员工管理
                </a>
                <a href="feishu-config.html" class="nav-link">
                    ⚙️ 飞书配置
                </a>
                <a href="anniversary-blessing-confirm.html" class="nav-link active">
                    🎉 祝福确认
                </a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🎉 入职周年祝福确认</h1>
            <p>每天早上9:00自动生成，等待您的确认</p>
        </div>

        <div class="main-content">
            <!-- 提示信息 -->
            <div class="alert alert-info show" id="alertInfo">
                💡 今天是 <strong id="todayDate"></strong>，系统已自动检查今日周年员工。
            </div>

            <div class="alert alert-success" id="alertSuccess">
                <strong>✅ 成功：</strong><span id="successMessage"></span>
            </div>

            <div class="alert alert-error" id="alertError">
                <strong>❌ 错误：</strong><span id="errorMessage"></span>
            </div>

            <!-- 统计信息 -->
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-number" id="statTotal">0</div>
                    <div class="stat-label">今日周年员工</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statPending">0</div>
                    <div class="stat-label">待确认</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statSent">0</div>
                    <div class="stat-label">已发送</div>
                </div>
            </div>

            <!-- 批量操作 -->
            <div class="batch-actions" id="batchActions" style="display: none;">
                <div>
                    <strong>批量操作：</strong>
                    <span id="batchCount">0</span> 条待发送
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="sendAllBlessings()">
                        📤 批量发送全部
                    </button>
                    <button class="btn btn-secondary" onclick="regenerateAll()">
                        🔄 全部重新生成
                    </button>
                </div>
            </div>

            <!-- 加载状态 -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在检查今日周年员工...</p>
            </div>

            <!-- 祝福列表 -->
            <div id="blessingsList"></div>

            <!-- 空状态 -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">🎊</div>
                <h3>今天没有员工入职周年</h3>
                <p>系统会在每天早上9:00自动检查</p>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ 编辑祝福语</h2>
                <button class="close-btn" onclick="closeEditModal()">×</button>
            </div>
            <textarea id="editTextarea"></textarea>
            <div class="actions" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveEditedMessage()">
                    💾 保存并发送
                </button>
                <button class="btn btn-secondary" onclick="closeEditModal()">
                    取消
                </button>
            </div>
        </div>
    </div>

    <script>
        // 祝福语模板库
        const templates = {
            general: [
                {
                    id: 1,
                    content: `🎉 {name}入职{years}周年快乐！

亲爱的{name}，
在{department}的日子里，你用专业和热情书写着属于自己的精彩篇章。

{years}年的坚守与陪伴，
感谢你为理想汽车的发展贡献力量！

期待与你共创更美好的未来！🚀`,
                    style: '正式专业'
                },
                {
                    id: 2,
                    content: `🎊 恭喜{name}，今天是你入职{years}周年的大日子！

从{joinDate}到今天，
你见证了理想的成长，
理想也见证了你的蜕变。

感谢一路同行，
未来继续携手前进！💪`,
                    style: '温暖亲切'
                },
                {
                    id: 3,
                    content: `⭐ {years}年前的今天，你选择了理想。
⭐ {years}年后的今天，理想感谢有你！

{name}，{department}的骄傲，
你的每一份付出都被看见和珍惜。

祝入职{years}周年快乐！
期待下一个{years}年，我们继续并肩前行！🌟`,
                    style: '简洁有力'
                },
                {
                    id: 4,
                    content: `🎂 {name}的入职{years}周年纪念日到啦！

{years}年时光，弹指一挥间，
你在{position}的岗位上发光发热，
为团队带来了无数精彩瞬间。

感谢你的专业、热情与担当！
周年快乐！🎉`,
                    style: '轻松幽默'
                },
                {
                    id: 5,
                    content: `💐 致{name}：

{years}年，
不长不短，刚好见证一段成长，
不多不少，刚好积淀一份情谊。

感谢你{years}年来的坚守与付出，
愿未来的日子里，
你与理想一起，越走越远，越走越好！

入职{years}周年快乐！🎈`,
                    style: '文艺抒情'
                }
            ],
            year1: [
                {
                    content: `🌱 新人不再是新人！

{name}，一年前你还是懵懂的职场新人，
今天已经成长为{department}的得力干将！

第一个周年，意义非凡，
感谢你的快速成长和积极融入！

祝入职1周年快乐！🎉
未来还有更多精彩等着你！`,
                    style: '第一个周年'
                }
            ],
            year3: [
                {
                    content: `🌳 三年成长，枝繁叶茂！

{name}，三年前你加入理想，
三年后你已是{department}不可或缺的中坚力量！

感谢你三年来的坚守与贡献，
愿未来与理想共同成长！

祝入职3周年快乐！🎊`,
                    style: '中坚力量'
                }
            ],
            year5: [
                {
                    content: `🏆 五年坚守，致敬匠心！

{name}，五年的时光，
你用专业和敬业诠释了什么是"理想人"！

五年磨一剑，你的付出有目共睹，
五年如一日，你的初心始终如一！

祝入职5周年快乐！🎉
感谢五年来的陪伴与贡献！`,
                    style: '资深员工'
                }
            ],
            year10: [
                {
                    content: `💎 十年如一，初心不改！

{name}，十年理想路，
你是见证者，更是创造者！

十年的坚守、十年的奋斗、十年的情谊，
都将成为理想发展史上浓墨重彩的一笔！

祝入职10周年快乐！🎊
感恩有你，未来可期！`,
                    style: '元老级员工'
                }
            ]
        };

        // 全局变量
        let blessings = [];
        let currentEditId = null;

        // 初始化
        window.addEventListener('load', () => {
            document.getElementById('todayDate').textContent = formatDate(new Date());
            checkTodayAnniversaries();
        });

        // 检查今日周年员工
        function checkTodayAnniversaries() {
            document.getElementById('loading').classList.add('show');

            // 从localStorage获取员工数据
            const employees = JSON.parse(localStorage.getItem('employees') || '[]');

            const today = new Date();
            const todayStr = `${today.getMonth() + 1}-${today.getDate()}`;

            const anniversaryEmployees = employees.filter(emp => {
                if (!emp.joinDate || emp.reminderEnabled === false) {
                    return false;
                }

                const joinDate = new Date(emp.joinDate);
                const empDateStr = `${joinDate.getMonth() + 1}-${joinDate.getDate()}`;
                return empDateStr === todayStr;
            }).map(emp => ({
                ...emp,
                years: today.getFullYear() - new Date(emp.joinDate).getFullYear()
            }));

            setTimeout(() => {
                document.getElementById('loading').classList.remove('show');

                if (anniversaryEmployees.length === 0) {
                    showEmptyState();
                } else {
                    generateBlessings(anniversaryEmployees);
                }
            }, 500);
        }

        // 生成祝福语
        function generateBlessings(employees) {
            blessings = employees.map(emp => {
                const blessing = generateBlessing(emp);
                return {
                    ...blessing,
                    status: 'pending' // pending, sent
                };
            });

            renderBlessings();
            updateStats();
        }

        // 生成单个祝福语
        function generateBlessing(employee) {
            const { name, years, department, position, joinDate } = employee;

            // 选择模板池
            let templatePool = templates.general;

            if (years === 1 && templates.year1) {
                templatePool = [...templates.year1, ...templates.general];
            } else if (years === 3 && templates.year3) {
                templatePool = [...templates.year3, ...templates.general];
            } else if (years === 5 && templates.year5) {
                templatePool = [...templates.year5, ...templates.general];
            } else if (years === 10 && templates.year10) {
                templatePool = [...templates.year10, ...templates.general];
            }

            // 随机选择
            const template = templatePool[Math.floor(Math.random() * templatePool.length)];

            // 替换变量
            let message = template.content
                .replace(/{name}/g, name || '同事')
                .replace(/{years}/g, years)
                .replace(/{department}/g, department || '团队')
                .replace(/{position}/g, position || '岗位')
                .replace(/{joinDate}/g, formatDate(new Date(joinDate)));

            message += `\n\n—— Li小历 · ${formatDate(new Date())}`;

            return {
                employee: employee,
                message: message,
                templateStyle: template.style,
                generatedAt: new Date()
            };
        }

        // 渲染祝福列表
        function renderBlessings() {
            const container = document.getElementById('blessingsList');

            if (blessings.length === 0) {
                showEmptyState();
                return;
            }

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('batchActions').style.display = 'flex';

            container.innerHTML = blessings.map((blessing, index) => `
                <div class="blessing-card" id="blessing-${index}">
                    <div class="employee-info">
                        <h3>${blessing.employee.name} - 入职${blessing.employee.years}周年 ${blessing.status === 'sent' ? '✅ 已发送' : ''}</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">部门：</span>
                                <span>${blessing.employee.department || '-'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">职位：</span>
                                <span>${blessing.employee.position || '-'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">入职日期：</span>
                                <span>${formatDate(new Date(blessing.employee.joinDate))}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">周年数：</span>
                                <span>${blessing.employee.years}周年</span>
                            </div>
                        </div>
                    </div>

                    <div class="template-info">
                        <span>💡 模板风格：<span class="template-style">${blessing.templateStyle}</span></span>
                        <span style="color: #86909C; font-size: 12px;">生成时间：${blessing.generatedAt.toLocaleString('zh-CN')}</span>
                    </div>

                    <div class="message-preview">${blessing.message}</div>

                    <div class="actions">
                        <button class="btn btn-primary" onclick="confirmSend(${index})" ${blessing.status === 'sent' ? 'disabled' : ''}>
                            ✅ ${blessing.status === 'sent' ? '已发送' : '立即发送'}
                        </button>
                        <button class="btn btn-secondary" onclick="regenerate(${index})" ${blessing.status === 'sent' ? 'disabled' : ''}>
                            🔄 重新生成
                        </button>
                        <button class="btn btn-secondary" onclick="editMessage(${index})" ${blessing.status === 'sent' ? 'disabled' : ''}>
                            ✏️ 修改
                        </button>
                        <button class="btn btn-danger" onclick="cancelBlessing(${index})" ${blessing.status === 'sent' ? 'disabled' : ''}>
                            ❌ 取消
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 确认发送
        async function confirmSend(index) {
            const blessing = blessings[index];

            if (blessing.status === 'sent') {
                return;
            }

            if (!confirm(`确定要发送给 ${blessing.employee.name} 的周年祝福吗？`)) {
                return;
            }

            try {
                showInfo('正在发送...');
                await sendToFeishu(blessing);

                blessing.status = 'sent';
                blessing.sentAt = new Date();

                showSuccess(`✅ 已成功发送给 ${blessing.employee.name}！`);
                renderBlessings();
                updateStats();
            } catch (error) {
                showError('发送失败：' + error.message);
            }
        }

        // 发送到飞书
        async function sendToFeishu(blessing) {
            const feishuConfig = JSON.parse(localStorage.getItem('feishuConfig') || '{}');

            if (!feishuConfig.webhookUrl) {
                throw new Error('未配置飞书Webhook，请先在飞书配置页面设置');
            }

            // 构建@人的消息内容
            let messageContent = blessing.message;

            // 如果有飞书user_id，在消息开头添加@
            if (blessing.employee.feishuUserId) {
                messageContent = `<at user_id="${blessing.employee.feishuUserId}"></at>\n\n` + messageContent;
            }

            const card = {
                msg_type: 'interactive',
                card: {
                    header: {
                        title: {
                            content: `🎉 ${blessing.employee.name}入职${blessing.employee.years}周年纪念`,
                            tag: 'plain_text'
                        },
                        template: 'turquoise'
                    },
                    elements: [
                        {
                            tag: 'div',
                            text: {
                                content: messageContent,
                                tag: 'lark_md'
                            }
                        },
                        {
                            tag: 'hr'
                        },
                        {
                            tag: 'div',
                            text: {
                                content: `**员工信息**\n部门：${blessing.employee.department || '-'}\n职位：${blessing.employee.position || '-'}\n入职日期：${formatDate(new Date(blessing.employee.joinDate))}\n周年数：${blessing.employee.years}周年`,
                                tag: 'lark_md'
                            }
                        }
                    ]
                }
            };

            const response = await fetch(feishuConfig.webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(card)
            });

            const result = await response.json();

            if (result.code !== 0) {
                throw new Error(`飞书返回错误: ${result.msg || '未知错误'} (code: ${result.code})`);
            }
        }

        // 重新生成
        function regenerate(index) {
            const blessing = blessings[index];

            if (blessing.status === 'sent') {
                return;
            }

            const newBlessing = generateBlessing(blessing.employee);
            blessings[index] = {
                ...newBlessing,
                status: 'pending'
            };

            renderBlessings();
            showSuccess('🔄 已重新生成新的祝福语');
        }

        // 编辑消息
        function editMessage(index) {
            const blessing = blessings[index];

            if (blessing.status === 'sent') {
                return;
            }

            currentEditId = index;
            document.getElementById('editTextarea').value = blessing.message;
            document.getElementById('editModal').classList.add('show');
        }

        // 保存编辑
        async function saveEditedMessage() {
            if (currentEditId === null) return;

            const newMessage = document.getElementById('editTextarea').value.trim();

            if (!newMessage) {
                alert('祝福语不能为空');
                return;
            }

            blessings[currentEditId].message = newMessage;
            closeEditModal();

            // 询问是否立即发送
            if (confirm('祝福语已更新，是否立即发送？')) {
                await confirmSend(currentEditId);
            } else {
                renderBlessings();
                showSuccess('祝福语已更新');
            }
        }

        // 关闭编辑框
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            currentEditId = null;
        }

        // 取消祝福
        function cancelBlessing(index) {
            if (!confirm('确定要取消这条祝福吗？')) {
                return;
            }

            blessings.splice(index, 1);
            renderBlessings();
            updateStats();
            showSuccess('已取消');
        }

        // 批量发送
        async function sendAllBlessings() {
            const pending = blessings.filter(b => b.status === 'pending');

            if (pending.length === 0) {
                showError('没有待发送的祝福');
                return;
            }

            if (!confirm(`确定要批量发送 ${pending.length} 条祝福吗？`)) {
                return;
            }

            let successCount = 0;
            let failCount = 0;

            for (let i = 0; i < blessings.length; i++) {
                if (blessings[i].status === 'pending') {
                    try {
                        await sendToFeishu(blessings[i]);
                        blessings[i].status = 'sent';
                        blessings[i].sentAt = new Date();
                        successCount++;
                    } catch (error) {
                        failCount++;
                        console.error('发送失败:', error);
                    }

                    // 避免发送过快
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
            }

            renderBlessings();
            updateStats();

            if (failCount === 0) {
                showSuccess(`✅ 已成功发送 ${successCount} 条祝福！`);
            } else {
                showError(`发送完成：成功 ${successCount} 条，失败 ${failCount} 条`);
            }
        }

        // 全部重新生成
        function regenerateAll() {
            if (!confirm('确定要重新生成所有祝福语吗？')) {
                return;
            }

            blessings = blessings.map(blessing => {
                if (blessing.status === 'pending') {
                    const newBlessing = generateBlessing(blessing.employee);
                    return {
                        ...newBlessing,
                        status: 'pending'
                    };
                }
                return blessing;
            });

            renderBlessings();
            showSuccess('🔄 已重新生成所有待发送的祝福语');
        }

        // 更新统计
        function updateStats() {
            const total = blessings.length;
            const sent = blessings.filter(b => b.status === 'sent').length;
            const pending = total - sent;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statSent').textContent = sent;
            document.getElementById('batchCount').textContent = pending;

            if (pending === 0 && total > 0) {
                document.getElementById('batchActions').style.display = 'none';
            }
        }

        // 显示空状态
        function showEmptyState() {
            document.getElementById('blessingsList').innerHTML = '';
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('batchActions').style.display = 'none';
            updateStats();
        }

        // 提示消息
        function showSuccess(message) {
            hideAlerts();
            document.getElementById('successMessage').textContent = message;
            document.getElementById('alertSuccess').classList.add('show');
            setTimeout(hideAlerts, 5000);
        }

        function showError(message) {
            hideAlerts();
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('alertError').classList.add('show');
        }

        function showInfo(message) {
            hideAlerts();
            document.getElementById('alertInfo').innerHTML = message;
            document.getElementById('alertInfo').classList.add('show');
        }

        function hideAlerts() {
            document.querySelectorAll('.alert').forEach(alert => {
                if (alert.id !== 'alertInfo') {
                    alert.classList.remove('show');
                }
            });
        }

        // 格式化日期
        function formatDate(date) {
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        }
    </script>
</body>
</html>
